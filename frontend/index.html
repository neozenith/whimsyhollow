<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>whimsyhollow</title>
    <!-- Brand webfonts. Inter = body (--font-sans), Bebas Neue = display headings
         (--font-display). Brand packs declare which family each var resolves to;
         these <link>s make sure the chosen family is actually loaded. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Pre-hydration theme: set the `.dark` class before first paint so there's no
      // flash of the wrong theme. ThemeProvider reads the same source of truth and
      // keeps this in sync afterwards. Mirrors readInitialTheme() in theme-provider.tsx.
      (() => {
        try {
          const stored = localStorage.getItem("ui-theme");
          const dark =
            stored === "dark" ||
            (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch {
          /* no storage / no matchMedia — fall back to the :root light baseline */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
