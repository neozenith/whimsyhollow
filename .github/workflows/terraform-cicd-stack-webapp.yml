name: Terraform CICD - webapp

# AUTO-GENERATED by the `tfs` CLI (tfs create) — per-stack caller for the reusable
# .github/workflows/terraform-cicd-per-stack.yml. Routing (which env an event
# applies to) lives in the reusable workflow; this file only wires the triggers +
# path filter for THIS stack and forwards the stack name.
#
# Regenerate / verify the full set with:
#   tfs gha-check        (or: uv run --frozen --directory infra/tfs tfs gha-check)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    paths:
      - 'infra/stacks/webapp/**'
      - 'backend/**'
      - 'frontend/**'
      - 'libs/**'
      - 'agent/**'
      - 'infra/modules/**'
      - '.github/workflows/terraform-cicd-stack-webapp.yml'
      - '.github/workflows/terraform-cicd-per-stack.yml'
      - '.github/actions/terraform/**'
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'infra/stacks/webapp/**'
      - 'backend/**'
      - 'frontend/**'
      - 'libs/**'
      - 'agent/**'
      - 'infra/modules/**'
      - '.github/workflows/terraform-cicd-stack-webapp.yml'
      - '.github/workflows/terraform-cicd-per-stack.yml'
      - '.github/actions/terraform/**'
  workflow_dispatch:

permissions:
  contents: read           # diagram is an uploaded artifact now (no ci-diagrams branch)
  id-token: write          # required by google-github-actions/auth (OIDC)
  pull-requests: write     # diagram job posts/updates the sticky PR comment

concurrency:
  group: terraform-webapp-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform:
    uses: ./.github/workflows/terraform-cicd-per-stack.yml
    with:
      stack: webapp
      # The backend image bundles the built React SPA (see backend/Dockerfile) and is
      # the single container the plain app runs — no agent sidecar (it stays disabled
      # in cloudrun.tf). CI builds backend/ and deploys it.
    secrets: inherit
