name: TF Stack

# Reusable workflow — the single home for Terraform routing + jobs, shared by
# every per-stack caller (.github/workflows/terraform-cicd-stack-<stack>.yml).
# The caller forwards its stack name; this workflow decides which environment
# each Git event applies to.
#
# Routing (mirrors the per-stack caller's triggers):
#   - draft PR                                   -> ci then `plan` matrix dev/test/prod
#   - ready-for-review PR                        -> ci then `plan` then `apply / dev`
#   - push to main                               -> ci then `plan` then `apply / test`
#   - tag push (v*) OR manual workflow_dispatch  -> ci then `plan` then `apply / prod`
#
# Safety gates:
#   1. `ci` runs first on every trigger (fmt-check + backend-config validate +
#      trivy). Every plan/apply job `needs: ci`, so a failure stops everything
#      before any cloud auth or state mutation.
#   2. `plan` (matrix dev/test/prod) runs on every trigger; every apply job
#      `needs: [ci, plan]`, so no apply mutates state until the full plan matrix
#      is green, and each apply serializes after its `plan / <env>` (no shared
#      GCS-state-lock race).
#   3. apply is atomic plan-then-apply inside the composite action.
#
# Cloud-touching jobs authenticate via Workload Identity Federation using the
# matching GitHub Environment's vars.WIF_PROVIDER + vars.TF_SA.

on:
  workflow_call:
    inputs:
      stack:
        description: Stack name under infra/stacks/.
        required: true
        type: string
      build_context:
        description: App build dir for `gcloud builds submit` (empty = no app image build).
        required: false
        type: string
        default: ''
      agent_build_context:
        description: Agent sidecar build dir (empty = no agent image / no sidecar).
        required: false
        type: string
        default: ''
      image_name:
        description: Artifact Registry repo + image name (empty = no app image; stack uses its terraform default).
        required: false
        type: string
        default: ''
      region:
        description: Region hosting Artifact Registry / Cloud Run.
        required: false
        type: string
        default: australia-southeast1

permissions:
  contents: read
  id-token: write          # required by google-github-actions/auth (OIDC)
  pull-requests: write

jobs:
  # Fast static-analysis gate — no cloud credentials. Runs first on every trigger.
  ci:
    name: ci (fmt-check + validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.10.0'
      - uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.71.0   # pin: avoids the rate-limited unauthenticated 'latest' GitHub API lookup
          cache: true
        env:
          # Authenticate the binary download (5000/hr) instead of the anonymous
          # 60/hr limit, which CI exhausts under repeated runs.
          GITHUB_TOKEN: ${{ github.token }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "infra/tfs/uv.lock"
      - name: make -C infra fmt-check security
        run: make -C infra fmt-check security
      - name: validate backend configs + CI workflow coverage
        run: |
          uv run --frozen --directory infra/tfs tfs validate
          uv run --frozen --directory infra/tfs tfs gha-check

  # Plan dev/test/prod on every trigger so the full blast radius is always visible.
  plan:
    name: plan / ${{ matrix.env }}
    needs: ci
    runs-on: ubuntu-latest
    environment: ${{ matrix.env }}
    strategy:
      fail-fast: false
      matrix:
        env: [dev, test, prod]
    env:
      # Plan against the image this commit WOULD deploy (built at apply time), so
      # the plan reflects the code change. Falls back to the stack's default image
      # for stacks that don't build one.
      TF_VAR_container_image: ${{ inputs.image_name != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-{2}/{1}-{2}:{3}', inputs.region, inputs.image_name, matrix.env, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      TF_VAR_agent_image: ${{ inputs.agent_build_context != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-{2}/agent:{3}', inputs.region, inputs.image_name, matrix.env, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      # IAP custom OAuth client (prod env secrets; empty for dev/test). Keeps the
      # prod plan from showing google_iap_settings as removed.
      TF_VAR_iap_oauth_client_id: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
      TF_VAR_iap_oauth_client_secret: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
      # IAP allow-list — a SECRET (JSON array of BARE emails, e.g. "a@x.com"); the stack
      # adds the "user:" prefix. A secret (not a var) so the list stays out of the public
      # Action logs. `|| '[]'` is load-bearing: iap_members is a list, so an unset secret
      # would inject an empty STRING and fail HCL list parsing — `[]` is a valid empty
      # list (fail-closed: IAP on + no members ⇒ nobody admitted).
      TF_VAR_iap_members: ${{ secrets.IAP_MEMBERS || '[]' }}
      # Future group allow-list (BARE group emails → "group:" prefix in the stack).
      # Empty until you create the IAP_MEMBER_GROUPS secret; no workflow change needed then.
      TF_VAR_iap_member_groups: ${{ secrets.IAP_MEMBER_GROUPS || '[]' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/terraform
        with:
          env: ${{ matrix.env }}
          stack: ${{ inputs.stack }}
          action: plan
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SA }}

  # PR only — render the plan-delta architecture diagram and post it as a sticky
  # comment linking to the uploaded PNG. Informational; does NOT gate applies.
  diagram:
    name: diagram (plan delta)
    needs: ci
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write        # push the PNG to the ci-diagrams branch (inline rendering)
      id-token: write        # WIF auth for the terraform plan
      pull-requests: write   # post the sticky comment
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
      # So the delta diagram reflects this commit's image (dev), not the default.
      TF_VAR_container_image: ${{ inputs.image_name != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-dev/{1}-dev:{2}', inputs.region, inputs.image_name, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      TF_VAR_agent_image: ${{ inputs.agent_build_context != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-dev/agent:{2}', inputs.region, inputs.image_name, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
    steps:
      - uses: actions/checkout@v6
      - name: Install graphviz (required by mingrammer diagrams)
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SA }}
      - uses: google-github-actions/setup-gcloud@v3
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.10.0'
      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      - uses: actions/cache@v5
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: ${{ runner.os }}-tf-plugins-${{ hashFiles(format('infra/stacks/{0}/.terraform.lock.hcl', inputs.stack)) }}
          restore-keys: |
            ${{ runner.os }}-tf-plugins-
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "infra/tfs/uv.lock"
      - name: Render plan-delta diagram (dev)
        run: uv run --frozen --directory infra/tfs tfs diagram ${{ inputs.stack }} dev --mode plan
      - id: upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.stack }}-dev-plan-diagram
          path: infra/diagrams/${{ inputs.stack }}-dev-plan.png
          if-no-files-found: error
      # Publish the PNG to a dedicated orphan branch so the PR comment can embed it
      # inline (raw.githubusercontent.com serves image bytes; an artifact zip can't).
      - id: publish
        name: Publish diagram to ci-diagrams branch
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          src="infra/diagrams/${{ inputs.stack }}-dev-plan.png"
          dest="${{ inputs.stack }}/dev/pr-${PR}.png"
          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          work="${RUNNER_TEMP}/ci-diagrams"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git clone --depth 1 --branch ci-diagrams "$repo_url" "$work" 2>/dev/null; then
            echo "reusing existing ci-diagrams branch"
          else
            echo "creating orphan ci-diagrams branch"
            git clone --depth 1 "$repo_url" "$work"
            git -C "$work" checkout --orphan ci-diagrams
            git -C "$work" rm -rfq . || true
          fi
          mkdir -p "$work/$(dirname "$dest")"
          cp "$src" "$work/$dest"
          git -C "$work" add "$dest"
          git -C "$work" commit -qm "ci(diagram): ${{ inputs.stack }} dev plan for PR #${PR} (${GITHUB_SHA})" || echo "no diagram change"
          git -C "$work" push -q origin ci-diagrams
          echo "raw_url=https://raw.githubusercontent.com/${{ github.repository }}/ci-diagrams/${dest}" >> "$GITHUB_OUTPUT"
      - name: Post / update sticky PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const stack = "${{ inputs.stack }}";
            const url = "${{ steps.upload.outputs.artifact-url }}";
            const img = "${{ steps.publish.outputs.raw_url }}?v=${{ github.sha }}";
            const marker = `<!-- tf-diagram:${stack} -->`;
            const body = [
              marker,
              `### 📊 \`${stack}\` — architecture plan delta (dev)`,
              ``,
              `![${stack} dev plan delta](${img})`,
              ``,
              `Rendered by \`tfs diagram ${stack} dev --mode plan\`. Nodes are coloured by plan`,
              `action (➕ create · ~ update · ± replace · 🗑️ delete).`,
              ``,
              `**[⬇️ Download the diagram PNG](${url})** (workflow artifact).`,
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # Ready-for-review PR — apply dev only (smoke test before merge to main).
  apply-dev:
    name: apply / dev
    needs: [ci, plan]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_VAR_container_image: ${{ inputs.image_name != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-dev/{1}-dev:{2}', inputs.region, inputs.image_name, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      TF_VAR_agent_image: ${{ inputs.agent_build_context != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-dev/agent:{2}', inputs.region, inputs.image_name, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      # IAP on iff these are set (per-env GitHub secret); empty ⇒ public. dev is
      # public by design (ADR-0003), so these are normally absent.
      TF_VAR_iap_oauth_client_id: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
      TF_VAR_iap_oauth_client_secret: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
      # IAP allow-list — a SECRET (JSON array of BARE emails, e.g. "a@x.com"); the stack
      # adds the "user:" prefix. A secret (not a var) so the list stays out of the public
      # Action logs. `|| '[]'` is load-bearing: iap_members is a list, so an unset secret
      # would inject an empty STRING and fail HCL list parsing — `[]` is a valid empty
      # list (fail-closed: IAP on + no members ⇒ nobody admitted).
      TF_VAR_iap_members: ${{ secrets.IAP_MEMBERS || '[]' }}
      # Future group allow-list (BARE group emails → "group:" prefix in the stack).
      # Empty until you create the IAP_MEMBER_GROUPS secret; no workflow change needed then.
      TF_VAR_iap_member_groups: ${{ secrets.IAP_MEMBER_GROUPS || '[]' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/terraform
        with:
          env: dev
          stack: ${{ inputs.stack }}
          action: apply
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SA }}
          build_context: ${{ inputs.build_context }}
          build_image: ${{ env.TF_VAR_container_image }}
          agent_build_context: ${{ inputs.agent_build_context }}
          agent_build_image: ${{ env.TF_VAR_agent_image }}

  # Merge / push to main — apply test.
  apply-test:
    name: apply / test
    needs: [ci, plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: test
    env:
      TF_VAR_container_image: ${{ inputs.image_name != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-test/{1}-test:{2}', inputs.region, inputs.image_name, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      TF_VAR_agent_image: ${{ inputs.agent_build_context != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-test/agent:{2}', inputs.region, inputs.image_name, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      # IAP on iff a test OAuth client secret is added to the test environment;
      # empty ⇒ public (current default). No code change needed to flip it on.
      TF_VAR_iap_oauth_client_id: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
      TF_VAR_iap_oauth_client_secret: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
      # IAP allow-list — a SECRET (JSON array of BARE emails, e.g. "a@x.com"); the stack
      # adds the "user:" prefix. A secret (not a var) so the list stays out of the public
      # Action logs. `|| '[]'` is load-bearing: iap_members is a list, so an unset secret
      # would inject an empty STRING and fail HCL list parsing — `[]` is a valid empty
      # list (fail-closed: IAP on + no members ⇒ nobody admitted).
      TF_VAR_iap_members: ${{ secrets.IAP_MEMBERS || '[]' }}
      # Future group allow-list (BARE group emails → "group:" prefix in the stack).
      # Empty until you create the IAP_MEMBER_GROUPS secret; no workflow change needed then.
      TF_VAR_iap_member_groups: ${{ secrets.IAP_MEMBER_GROUPS || '[]' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/terraform
        with:
          env: test
          stack: ${{ inputs.stack }}
          action: apply
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SA }}
          build_context: ${{ inputs.build_context }}
          build_image: ${{ env.TF_VAR_container_image }}
          agent_build_context: ${{ inputs.agent_build_context }}
          agent_build_image: ${{ env.TF_VAR_agent_image }}

  # Tag (v*) or manual dispatch — apply prod. Add required reviewers to the
  # "prod" GitHub Environment to gate this behind a human approval.
  apply-prod:
    name: apply / prod
    needs: [ci, plan]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod
    env:
      TF_VAR_container_image: ${{ inputs.image_name != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-prod/{1}-prod:{2}', inputs.region, inputs.image_name, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      TF_VAR_agent_image: ${{ inputs.agent_build_context != '' && format('{0}-docker.pkg.dev/whimsyhollow/{1}-prod/agent:{2}', inputs.region, inputs.image_name, github.sha) || 'us-docker.pkg.dev/cloudrun/container/hello' }}
      # Prod is IAP-gated and needs its custom OAuth client (no-org requirement).
      TF_VAR_iap_oauth_client_id: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
      TF_VAR_iap_oauth_client_secret: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
      # IAP allow-list — a SECRET (JSON array of BARE emails, e.g. "a@x.com"); the stack
      # adds the "user:" prefix. A secret (not a var) so the list stays out of the public
      # Action logs. `|| '[]'` is load-bearing: iap_members is a list, so an unset secret
      # would inject an empty STRING and fail HCL list parsing — `[]` is a valid empty
      # list (fail-closed: IAP on + no members ⇒ nobody admitted).
      TF_VAR_iap_members: ${{ secrets.IAP_MEMBERS || '[]' }}
      # Future group allow-list (BARE group emails → "group:" prefix in the stack).
      # Empty until you create the IAP_MEMBER_GROUPS secret; no workflow change needed then.
      TF_VAR_iap_member_groups: ${{ secrets.IAP_MEMBER_GROUPS || '[]' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/terraform
        with:
          env: prod
          stack: ${{ inputs.stack }}
          action: apply
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SA }}
          build_context: ${{ inputs.build_context }}
          build_image: ${{ env.TF_VAR_container_image }}
          agent_build_context: ${{ inputs.agent_build_context }}
          agent_build_image: ${{ env.TF_VAR_agent_image }}
