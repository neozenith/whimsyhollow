name: Terraform
description: |
  Authenticate to GCP via Workload Identity Federation and run
  terraform init + (plan | apply) for one environment of a single
  infra/stacks/<stack> stack.

inputs:
  env:
    description: Environment name — one of dev / test / prod.
    required: true
  stack:
    description: Stack name under infra/stacks/.
    required: false
    default: webapp
  action:
    description: Terraform action — "plan" or "apply".
    required: true
  workload_identity_provider:
    description: Full WIF provider resource (from GitHub Environment vars.WIF_PROVIDER).
    required: true
  service_account:
    description: Deployer service account email (from GitHub Environment vars.TF_SA).
    required: true
  terraform_version:
    description: Terraform CLI version to install.
    required: false
    default: '1.10.0'
  build_context:
    description: If set, `gcloud builds submit` this dir and push build_image before terraform (app image build).
    required: false
    default: ''
  build_image:
    description: Full image ref (repo:tag) to build/push when build_context is set. Also pass it to terraform via TF_VAR_container_image at the job level.
    required: false
    default: ''
  agent_build_context:
    description: If set, also build/push the agent sidecar image from this dir's cloudbuild.yaml.
    required: false
    default: ''
  agent_build_image:
    description: Full image ref (repo:tag) for the agent image when agent_build_context is set. Pass to terraform via TF_VAR_agent_image at the job level.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}

    - uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - if: inputs.build_context != ''
      uses: google-github-actions/setup-gcloud@v3

    # Init BEFORE building, so the next step can pre-create the Artifact Registry repo
    # the image push targets.
    - shell: bash
      run: terraform -chdir=infra/stacks/${{ inputs.stack }} init -backend-config=./backends/${{ inputs.env }}.config -reconfigure

    # Chicken-and-egg fix: on a first (or renamed) deploy the env's Artifact Registry
    # repo doesn't exist yet, so `gcloud builds submit` would fail to push. Pre-create
    # JUST the repo (+ its API enable) with a targeted apply before the build. Only on
    # apply-with-build (plan never mutates); idempotent on re-runs.
    - if: inputs.action == 'apply' && inputs.build_context != ''
      name: Pre-create Artifact Registry repo (targeted apply)
      shell: bash
      run: terraform -chdir=infra/stacks/${{ inputs.stack }} apply -input=false -auto-approve -var environment=${{ inputs.env }} -target=google_artifact_registry_repository.app

    # Build + push the application image into the env's Artifact Registry, so the
    # apply deploys real code (terraform reads the tag via TF_VAR_container_image).
    - if: inputs.build_context != ''
      name: Build & push image (${{ inputs.build_image }})
      shell: bash
      # Repo-root context + the service's cloudbuild.yaml so the frontend is in scope.
      run: |
        gcloud builds submit . \
          --project "whimsyhollow" \
          --config "${{ inputs.build_context }}/cloudbuild.yaml" \
          --substitutions=_IMAGE="${{ inputs.build_image }}"

    - if: inputs.agent_build_context != ''
      name: Build & push agent image (${{ inputs.agent_build_image }})
      shell: bash
      run: |
        gcloud builds submit . \
          --project "whimsyhollow" \
          --config "${{ inputs.agent_build_context }}/cloudbuild.yaml" \
          --substitutions=_IMAGE="${{ inputs.agent_build_image }}"

    - if: inputs.action == 'plan'
      shell: bash
      run: |
        terraform -chdir=infra/stacks/${{ inputs.stack }} validate
        terraform -chdir=infra/stacks/${{ inputs.stack }} plan -input=false -no-color -var environment=${{ inputs.env }}

    # Atomic plan-then-apply: if the plan step errors (bash -e), the apply
    # step won't run because the prior step failed. The on-disk tfplan also
    # guarantees apply executes exactly what plan showed — no drift between
    # the two operations.
    - if: inputs.action == 'apply'
      name: terraform plan -out=tfplan
      shell: bash
      run: terraform -chdir=infra/stacks/${{ inputs.stack }} plan -input=false -no-color -out=tfplan -var environment=${{ inputs.env }}

    - if: inputs.action == 'apply'
      name: terraform apply tfplan
      shell: bash
      run: terraform -chdir=infra/stacks/${{ inputs.stack }} apply -input=false -auto-approve tfplan
