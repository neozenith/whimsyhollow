name: Terraform
description: |
  Authenticate to GCP via Workload Identity Federation and run
  terraform init + (plan | apply) for one environment of a single
  infra/stacks/<stack> stack.

inputs:
  env:
    description: Environment name — one of dev / test / prod.
    required: true
  stack:
    description: Stack name under infra/stacks/.
    required: false
    default: webapp
  action:
    description: Terraform action — "plan" or "apply".
    required: true
  workload_identity_provider:
    description: Full WIF provider resource (from GitHub Environment vars.WIF_PROVIDER).
    required: true
  service_account:
    description: Deployer service account email (from GitHub Environment vars.TF_SA).
    required: true
  terraform_version:
    description: Terraform CLI version to install.
    required: false
    default: '1.10.0'
  build_context:
    description: If set, `gcloud builds submit` this dir and push build_image before terraform (app image build).
    required: false
    default: ''
  build_image:
    description: Full image ref (repo:tag) to build/push when build_context is set. Also pass it to terraform via TF_VAR_container_image at the job level.
    required: false
    default: ''
  agent_build_context:
    description: If set, also build/push the agent sidecar image from this dir's cloudbuild.yaml.
    required: false
    default: ''
  agent_build_image:
    description: Full image ref (repo:tag) for the agent image when agent_build_context is set. Pass to terraform via TF_VAR_agent_image at the job level.
    required: false
    default: ''

runs:
  using: composite
  steps:
    # IAP allow-list handling (reads the plain IAP_MEMBERS / IAP_MEMBER_GROUPS job env):
    #  1. ::add-mask:: every email so terraform plan/apply prints "user:***" in the
    #     public logs (the list isn't terraform-`sensitive` — that breaks TF_VAR_ supply).
    #  2. Export TF_VAR_* ONLY when a real value is provided. An empty/unset value is
    #     left to the terraform default ([]) — passing an empty list via TF_VAR_ trips
    #     terraform's plan/apply consistency check ("[]" vs empty tuple). dev (no secret)
    #     therefore deploys public with zero members, no error.
    - name: Mask + export IAP allow-list
      shell: bash
      run: |
        emails=$(printf '%s\n%s\n' "${IAP_MEMBERS:-}" "${IAP_MEMBER_GROUPS:-}" \
          | grep -oiE '[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}' | sort -u || true)
        for e in $emails; do echo "::add-mask::$e"; done
        if [ -n "${IAP_MEMBERS:-}" ] && [ "${IAP_MEMBERS}" != "[]" ]; then
          echo "TF_VAR_iap_members=${IAP_MEMBERS}" >> "$GITHUB_ENV"
        fi
        if [ -n "${IAP_MEMBER_GROUPS:-}" ] && [ "${IAP_MEMBER_GROUPS}" != "[]" ]; then
          echo "TF_VAR_iap_member_groups=${IAP_MEMBER_GROUPS}" >> "$GITHUB_ENV"
        fi

    - id: auth
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.workload_identity_provider }}
        service_account: ${{ inputs.service_account }}

    - uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform_version }}

    # gcloud: tfs's project guardrail (check_project) + the image builds need it.
    - uses: google-github-actions/setup-gcloud@v3

    # uv: runs the curated `tfs` CLI.
    - uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: "infra/tfs/uv.lock"

    # Everything below drives terraform through the curated `tfs` CLI — the single,
    # opinionated deploy interface. `tfs plan` and `tfs apply` use IDENTICAL flags
    # (a direct apply: no saved plan, no -target), so plan and apply never diverge and
    # TF_VAR_* is supplied consistently. The Artifact Registry repo is created up front
    # by infra/bootstrap, so there is no build-vs-terraform chicken-and-egg here.
    - name: tfs init
      shell: bash
      run: uv run --frozen --directory infra/tfs tfs init ${{ inputs.stack }} ${{ inputs.env }}

    # Build + push the app image into the env's (already-existing) Artifact Registry
    # repo. terraform reads the tag via TF_VAR_container_image at apply time.
    - if: inputs.build_context != ''
      name: Build & push image (${{ inputs.build_image }})
      shell: bash
      run: |
        gcloud builds submit . \
          --project "whimsyhollow" \
          --config "${{ inputs.build_context }}/cloudbuild.yaml" \
          --substitutions=_IMAGE="${{ inputs.build_image }}"

    - if: inputs.agent_build_context != ''
      name: Build & push agent image (${{ inputs.agent_build_image }})
      shell: bash
      run: |
        gcloud builds submit . \
          --project "whimsyhollow" \
          --config "${{ inputs.agent_build_context }}/cloudbuild.yaml" \
          --substitutions=_IMAGE="${{ inputs.agent_build_image }}"

    - if: inputs.action == 'plan'
      name: tfs plan
      shell: bash
      run: uv run --frozen --directory infra/tfs tfs plan ${{ inputs.stack }} ${{ inputs.env }}

    - if: inputs.action == 'apply'
      name: tfs apply
      shell: bash
      run: uv run --frozen --directory infra/tfs tfs apply ${{ inputs.stack }} ${{ inputs.env }}
